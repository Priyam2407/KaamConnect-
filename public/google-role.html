<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Your Role — KaamConnect</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root{--saffron:#E8601C;--saffron-2:#F0783A;--saffron-pale:#FEF0E8;--forest:#1A3C34;--sage:#3D7A6E;--sage-light:#E5F0EE;--cream:#FAF7F2;--white:#FFFFFF;--ink:#0F1923;--ink-40:rgba(15,25,35,.4);--ink-12:rgba(15,25,35,.12);--ink-06:rgba(15,25,35,.06)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;position:relative}
body::before{content:'';position:fixed;top:-100px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(232,96,28,.07),transparent 60%);pointer-events:none}
body::after{content:'';position:fixed;bottom:-100px;left:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(26,60,52,.08),transparent 60%);pointer-events:none}

.card{background:var(--white);border:1.5px solid var(--ink-06);border-radius:24px;padding:48px 40px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(15,25,35,.08);position:relative;z-index:1;animation:up .4s cubic-bezier(.22,1,.36,1)}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px;justify-content:center}
.logo-mark{width:36px;height:36px;background:var(--saffron);border-radius:10px;display:grid;place-items:center;font-size:16px;color:#fff}
.logo-txt{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;color:var(--forest)}
.logo-txt span{color:var(--saffron)}
.avatar-row{display:flex;align-items:center;gap:12px;background:var(--sage-light);border-radius:14px;padding:14px 16px;margin-bottom:28px}
.avatar{width:44px;height:44px;border-radius:50%;background:var(--saffron);display:grid;place-items:center;color:#fff;font-size:18px;font-weight:700;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.av-name{font-weight:700;font-size:15px;color:var(--forest)}
.av-email{font-size:12.5px;color:var(--ink-40);margin-top:2px}
h1{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--forest);letter-spacing:-.5px;margin-bottom:6px;text-align:center}
.sub{font-size:14.5px;color:var(--ink-40);text-align:center;margin-bottom:28px;font-weight:300}
.roles{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.rbtn{padding:24px 16px;border:2px solid var(--ink-12);border-radius:18px;text-align:center;cursor:pointer;background:var(--cream);transition:all .22s;user-select:none;position:relative}
.rbtn:hover{border-color:var(--saffron-2);background:var(--saffron-pale);transform:translateY(-2px)}
.rbtn.on{border-color:var(--saffron);background:var(--saffron-pale);box-shadow:0 6px 24px rgba(232,96,28,.18);transform:translateY(-2px)}
.rbtn-check{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;background:var(--saffron);display:none;align-items:center;justify-content:center;color:#fff;font-size:12px}
.rbtn.on .rbtn-check{display:flex}
.rbtn-ico{font-size:36px;margin-bottom:10px;display:block}
.rbtn-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--saffron);background:rgba(232,96,28,.1);border-radius:100px;padding:3px 10px;margin-bottom:6px}
.rbtn-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--forest);margin-bottom:4px}
.rbtn-desc{font-size:12px;color:var(--ink-40);line-height:1.5}
.btn{width:100%;padding:14px;background:var(--saffron);border:none;border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .22s;box-shadow:0 4px 16px rgba(232,96,28,.3);display:flex;align-items:center;justify-content:center;gap:8px}
.btn:hover{background:var(--saffron-2);transform:translateY(-1px);box-shadow:0 6px 24px rgba(232,96,28,.38)}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.spin{display:none;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{padding:11px 14px;border-radius:10px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:9px;margin-bottom:16px}
.ae{background:#FEF2F2;color:#DC2626;border:1.5px solid #FECACA}
@media(max-width:480px){.card{padding:32px 20px}.roles{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark"><i class="bi bi-tools"></i></div>
    <div class="logo-txt">Kaam<span>Connect</span></div>
  </div>

  <div class="avatar-row" id="avatarRow">
    <div class="avatar" id="avImg">?</div>
    <div>
      <div class="av-name" id="avName">Loading…</div>
      <div class="av-email" id="avEmail"></div>
    </div>
  </div>

  <h1>How will you use KaamConnect?</h1>
  <p class="sub">Choose your role — this decides what you can do on the platform.</p>

  <div id="alertBox" style="display:none"></div>

  <div class="roles">
    <div class="rbtn on" id="rb-c" onclick="pick('customer')">
      <div class="rbtn-check"><i class="bi bi-check"></i></div>
      <span class="rbtn-ico">👤</span>
      <div class="rbtn-tag">Customer</div>
      <div class="rbtn-name">Hire a Worker</div>
      <div class="rbtn-desc">Find verified skilled workers fast</div>
    </div>
    <div class="rbtn" id="rb-w" onclick="pick('worker')">
      <div class="rbtn-check"><i class="bi bi-check"></i></div>
      <span class="rbtn-ico">👷</span>
      <div class="rbtn-tag">Worker</div>
      <div class="rbtn-name">Find Work</div>
      <div class="rbtn-desc">Get jobs & earn money daily</div>
    </div>
  </div>

  <button class="btn" id="continueBtn" onclick="continueWith()">
    <i class="bi bi-arrow-right-circle-fill"></i> Continue as <span id="roleLabel">Customer</span>
    <i class="bi bi-arrow-repeat spin" id="sp"></i>
  </button>
</div>

<script>
// ── Read token & user from URL (passed from Google callback) ──
const params  = new URLSearchParams(window.location.search);
const token   = params.get('token');
const userStr = params.get('user');

if (!token || !userStr) {
  window.location.replace('/login.html');
}

let user;
try {
  user = JSON.parse(decodeURIComponent(userStr));
} catch(e) {
  window.location.replace('/login.html');
}

// ── Show user info ────────────────────────────────────────────
document.getElementById('avName').textContent  = user.name  || 'User';
document.getElementById('avEmail').textContent = user.email || '';
if (user.avatar) {
  document.getElementById('avImg').innerHTML = `<img src="${user.avatar}" alt="avatar">`;
} else {
  document.getElementById('avImg').textContent = (user.name || 'U')[0].toUpperCase();
}

// ── Role selection ────────────────────────────────────────────
let selectedRole = 'customer';
function pick(r) {
  selectedRole = r;
  document.getElementById('rb-c').classList.toggle('on', r === 'customer');
  document.getElementById('rb-w').classList.toggle('on', r === 'worker');
  document.getElementById('roleLabel').textContent = r === 'worker' ? 'Worker' : 'Customer';
}

// ── Submit ────────────────────────────────────────────────────
async function continueWith() {
  const btn = document.getElementById('continueBtn');
  const sp  = document.getElementById('sp');
  btn.disabled = true; sp.style.display = 'inline-block';

  try {
    const r = await fetch('/api/auth/google/role', {
      method:  'PUT',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': 'Bearer ' + token,
      },
      body: JSON.stringify({ role: selectedRole }),
    });
    const d = await r.json();
    if (d.success) {
      // Save updated token & user (role is now correct)
      localStorage.setItem('kc_token', d.token);
      localStorage.setItem('kc_user', JSON.stringify(d.user));
      const dest = d.user.role === 'worker' ? 'worker-dashboard.html' : 'customer-dashboard.html';
      window.location.replace(dest);
    } else {
      showAlert(d.message || 'Something went wrong. Please try again.');
      btn.disabled = false; sp.style.display = 'none';
    }
  } catch(e) {
    showAlert('Cannot connect to server.');
    btn.disabled = false; sp.style.display = 'none';
  }
}

function showAlert(m) {
  const b = document.getElementById('alertBox');
  b.style.display = 'flex'; b.className = 'alert ae';
  b.innerHTML = `<i class="bi bi-exclamation-circle-fill"></i> ${m}`;
}
</script>
</body>
</html>
