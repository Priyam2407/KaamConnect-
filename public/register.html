<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — KaamConnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0TWZGCR7DB"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-0TWZGCR7DB');
</script>
<style>
:root{--saffron:#E8601C;--saffron-2:#F0783A;--saffron-pale:#FEF0E8;--saffron-light:#FDE0CF;--forest:#1A3C34;--forest-2:#24524A;--sage:#3D7A6E;--sage-light:#E5F0EE;--cream:#FAF7F2;--white:#FFFFFF;--ink:#0F1923;--ink-70:rgba(15,25,35,.7);--ink-40:rgba(15,25,35,.4);--ink-12:rgba(15,25,35,.12);--ink-06:rgba(15,25,35,.06)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:52px 20px 80px;-webkit-font-smoothing:antialiased;position:relative}
body::before{content:'';position:fixed;top:-100px;right:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(232,96,28,.07),transparent 60%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:-100px;left:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(26,60,52,.08),transparent 60%);pointer-events:none;z-index:0}
a{text-decoration:none;color:inherit}
.page-top{text-align:center;margin-bottom:32px;position:relative;z-index:1}
.logo{display:inline-flex;align-items:center;gap:11px;margin-bottom:24px}
.logo-mark{width:40px;height:40px;border-radius:12px;background:var(--saffron);display:grid;place-items:center;color:#fff;font-size:18px;box-shadow:0 4px 16px rgba(232,96,28,.3)}
.logo-txt{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;color:var(--forest);letter-spacing:-.4px}
.logo-txt span{color:var(--saffron)}
h1{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--forest);letter-spacing:-1px;margin-bottom:6px}
.subtitle{font-size:14.5px;color:var(--ink-40);font-weight:300}
.card{background:var(--white);border:1.5px solid var(--ink-06);border-radius:20px;padding:44px;width:100%;max-width:560px;box-shadow:0 16px 60px rgba(15,25,35,.07);position:relative;z-index:1}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px}
.rbtn{padding:20px 16px;border:2px solid var(--ink-12);border-radius:16px;text-align:center;cursor:pointer;background:var(--cream);transition:all .22s;user-select:none;position:relative}
.rbtn:hover{border-color:var(--saffron-2);background:var(--saffron-pale)}
.rbtn.on{border-color:var(--saffron);background:var(--saffron-pale);box-shadow:0 4px 20px rgba(232,96,28,.15)}
.rbtn-check{position:absolute;top:12px;right:12px;width:20px;height:20px;border-radius:50%;background:var(--saffron);display:none;align-items:center;justify-content:center;color:#fff;font-size:11px}
.rbtn.on .rbtn-check{display:flex}
.rbtn-ico{width:50px;height:50px;border-radius:14px;background:var(--sage-light);border:1.5px solid var(--ink-06);display:grid;place-items:center;font-size:24px;margin:0 auto 10px;transition:all .22s}
.rbtn.on .rbtn-ico{background:var(--forest);border-color:var(--forest)}
.rbtn-name{font-family:'Syne',sans-serif;font-size:14.5px;font-weight:700;color:var(--forest);margin-bottom:3px}
.rbtn-desc{font-size:12.5px;color:var(--ink-40)}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-40);margin-bottom:18px;display:flex;align-items:center;gap:10px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--ink-06)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg{margin-bottom:16px}
.fl{display:block;font-size:12px;font-weight:700;color:var(--forest);margin-bottom:7px;letter-spacing:.3px}
.fw{position:relative}
.fi{width:100%;padding:12px 14px 12px 42px;border:1.5px solid var(--ink-12);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);background:var(--cream);outline:none;transition:all .2s;appearance:none}
.fi::placeholder{color:var(--ink-40);font-weight:300}
.fi:focus{border-color:var(--saffron);background:var(--white);box-shadow:0 0 0 3px rgba(232,96,28,.1)}
.fi-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-40);font-size:13px;pointer-events:none;transition:color .2s}
.fw:focus-within .fi-ico{color:var(--saffron)}
textarea.fi{min-height:80px;resize:vertical;padding-top:11px;padding-left:14px}
.pw-bars{display:flex;gap:4px;margin-top:8px}
.pw-bar{height:3px;flex:1;background:var(--ink-06);border-radius:3px;transition:all .3s}
.worker-extra{display:none;border-top:1.5px solid var(--ink-06);margin-top:8px;padding-top:24px;animation:slideIn .26s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.submit-btn{width:100%;padding:14px;background:var(--saffron);border:none;border-radius:11px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .22s;box-shadow:0 4px 16px rgba(232,96,28,.3);margin-top:8px}
.submit-btn:hover{background:var(--saffron-2);transform:translateY(-1px);box-shadow:0 6px 24px rgba(232,96,28,.38)}
.submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
.spin{display:none;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.alert{padding:11px 14px;border-radius:10px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:9px;margin-bottom:16px}
.ae{background:#FEF2F2;color:#DC2626;border:1.5px solid #FECACA}
.as{background:#F0FDF4;color:#15803D;border:1.5px solid #BBF7D0}
.signin-row{text-align:center;font-size:13.5px;color:var(--ink-40);margin-top:20px;position:relative;z-index:1}
.signin-row a{color:var(--saffron);font-weight:700}
@media(max-width:540px){.card{padding:28px 20px}.frow{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="page-top">
  <a class="logo" href="index.html">
    <div class="logo-mark"><i class="bi bi-tools"></i></div>
    <div class="logo-txt">Kaam<span>Connect</span></div>
  </a>
  <h1>Create Account</h1>
  <p class="subtitle">Join India's fastest growing worker marketplace — free forever.</p>
</div>

<div class="card">
  <div id="alertBox" style="display:none"></div>

  <div class="sec-lbl">I want to</div>
  <div class="role-grid">
    <div class="rbtn on" id="rb-c" onclick="setRole('customer')">
      <div class="rbtn-check"><i class="bi bi-check"></i></div>
      <div class="rbtn-ico">👤</div>
      <div class="rbtn-name">Hire a Worker</div>
      <div class="rbtn-desc">Find verified help fast</div>
    </div>
    <div class="rbtn" id="rb-w" onclick="setRole('worker')">
      <div class="rbtn-check"><i class="bi bi-check"></i></div>
      <div class="rbtn-ico">👷</div>
      <div class="rbtn-name">Find Work</div>
      <div class="rbtn-desc">Get jobs &amp; earn money</div>
    </div>
  </div>

  <input type="hidden" id="role" value="customer">

  <div class="sec-lbl">Your Details</div>
  <div class="frow">
    <div class="fg">
      <label class="fl">Full Name</label>
      <div class="fw">
        <input class="fi" type="text" id="name" placeholder="Rajesh Kumar">
        <i class="bi bi-person fi-ico"></i>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Phone Number</label>
      <div class="fw">
        <input class="fi" type="text" id="phone" placeholder="9876543210">
        <i class="bi bi-phone fi-ico"></i>
      </div>
    </div>
  </div>

  <div class="fg">
    <label class="fl">Email Address</label>
    <div class="fw">
      <input class="fi" type="email" id="email" placeholder="you@example.com">
      <i class="bi bi-envelope fi-ico"></i>
    </div>
  </div>

  <div class="frow">
    <div class="fg">
      <label class="fl">City / Location</label>
      <div class="fw">
        <input class="fi" type="text" id="cityInput" placeholder="e.g. Ludhiana">
        <i class="bi bi-geo-alt fi-ico"></i>
      </div>
    </div>
    <div class="fg">
      <label class="fl">Password</label>
      <div class="fw">
        <input class="fi" type="password" id="password" placeholder="Min 6 characters" oninput="checkPw(this.value)">
        <i class="bi bi-lock fi-ico"></i>
      </div>
      <div class="pw-bars">
        <div class="pw-bar" id="pb1"></div>
        <div class="pw-bar" id="pb2"></div>
        <div class="pw-bar" id="pb3"></div>
        <div class="pw-bar" id="pb4"></div>
      </div>
    </div>
  </div>

  <div class="worker-extra" id="workerExtra">
    <div class="sec-lbl" style="margin-top:4px">Worker Details</div>
    <div class="fg">
      <label class="fl">Primary Skill</label>
      <div class="fw">
        <select class="fi" id="skill">
          <option value="">Select your main skill</option>
          <option value="electrician">⚡ Electrician</option>
          <option value="plumber">🔧 Plumber</option>
          <option value="painter">🎨 Painter</option>
          <option value="carpenter">🪚 Carpenter</option>
          <option value="labour">👷 Labour</option>
          <option value="mason">🧱 Mason</option>
          <option value="ac technician">❄️ AC Technician</option>
          <option value="driver">🚗 Driver</option>
        </select>
        <i class="bi bi-tools fi-ico"></i>
      </div>
    </div>
    <div class="fg">
      <label class="fl">About You</label>
      <textarea class="fi" id="bio" placeholder="Briefly describe your experience and specialties…"></textarea>
    </div>
  </div>

  <button class="submit-btn" id="regBtn" onclick="register()">
    <i class="bi bi-person-plus-fill"></i> Create Account
    <i class="bi bi-arrow-repeat spin" id="sp"></i>
  </button>
</div>

<p class="signin-row">Already have an account? <a href="login.html">Sign in →</a></p>

<script>
// Pre-select worker role if URL param present
if (new URLSearchParams(window.location.search).get('role') === 'worker') setRole('worker');

function setRole(r) {
  document.getElementById('role').value = r;
  document.getElementById('rb-c').classList.toggle('on', r === 'customer');
  document.getElementById('rb-w').classList.toggle('on', r === 'worker');
  document.getElementById('workerExtra').style.display = r === 'worker' ? 'block' : 'none';
}

function checkPw(v) {
  const c = [v.length >= 6, v.length >= 8, /[A-Z0-9]/.test(v), /[^A-Za-z0-9]/.test(v)];
  const cols = ['#DC2626', '#F59E0B', '#2E7D5E', '#15803D'];
  const n = c.filter(Boolean).length;
  for (let i = 0; i < 4; i++) {
    document.getElementById('pb' + (i + 1)).style.background = i < n ? cols[Math.min(n - 1, 3)] : 'var(--ink-06)';
  }
}

function showAlert(t, m) {
  const b = document.getElementById('alertBox');
  b.style.display = 'flex';
  b.className = 'alert ' + (t === 'error' ? 'ae' : 'as');
  b.innerHTML = `<i class="bi bi-${t === 'error' ? 'exclamation-circle-fill' : 'check-circle-fill'}"></i> ${m}`;
}

async function register() {
  const role     = document.getElementById('role').value;
  const name     = document.getElementById('name').value.trim();
  const phone    = document.getElementById('phone').value.trim();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const city     = document.getElementById('cityInput').value.trim();
  const skill    = document.getElementById('skill') ? document.getElementById('skill').value : '';
  const bio      = document.getElementById('bio') ? document.getElementById('bio').value.trim() : '';

  if (!name || !email || !password || !city) {
    showAlert('error', 'Please fill in all required fields');
    return;
  }
  if (password.length < 6) {
    showAlert('error', 'Password must be at least 6 characters');
    return;
  }
  if (role === 'worker' && !skill) {
    showAlert('error', 'Please select your primary skill');
    return;
  }

  const btn = document.getElementById('regBtn');
  const sp  = document.getElementById('sp');
  btn.disabled = true;
  sp.style.display = 'inline-block';

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        email,
        password,
        phone,
        role,
        skill: skill || null,
        location: city,
        bio: bio || null
      })
    });

    const data = await res.json();

    if (data.success) {
      localStorage.setItem('kc_token', data.token);
      localStorage.setItem('kc_user', JSON.stringify(data.user));
      showAlert('success', 'Account created! Redirecting…');

      const dest = role === 'worker' ? 'worker-dashboard.html' : 'customer-dashboard.html';
      setTimeout(function() {
        window.location.href = dest;
      }, 1200);

      // Keep button disabled so user can't double-submit
      return;
    } else {
      showAlert('error', data.message || 'Registration failed. Please try again.');
    }
  } catch (err) {
    showAlert('error', 'Cannot connect to server. Is it running?');
  }

  btn.disabled = false;
  sp.style.display = 'none';
}
</script>
</body>
</html>
